name: Test git-annex wheel from PyPi

on:
  schedule:
    - cron: '5 23 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  LANG: C.utf-8

jobs:
  test-wheel:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - windows-latest
          - windows-2022
          - macos-latest
          - macos-14
        # Empty `python` means "let uv pick" (CPython by default).
        python: [""]
        include:
          # The wheel is tagged `py3-none-<platform>`, which is implementation-
          # agnostic. Verify it actually installs and runs under PyPy as well,
          # so downstream PyPy users (e.g. datalad-installer) don't regress.
          - os: ubuntu-latest
            python: pypy@3.10
          - os: macos-latest
            python: pypy@3.10
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install git-annex
        env:
          PYTHON_SPEC: ${{ matrix.python }}
        run: |
          uv tool install ${PYTHON_SPEC:+--python "$PYTHON_SPEC"} git-annex

      - name: Which git-annex
        run: |
          git annex version

      - name: Test git-annex
        run: |
          git annex test
